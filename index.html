<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Shop</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f4f4f4; }
    header { background: #333; color: white; padding: 15px; text-align: center; }
    .container { display: flex; }
    .products { width: 70%; padding: 20px; }
    .cart { width: 30%; background: white; padding: 20px; }
    .product { background: white; padding: 15px; margin: 10px; display: inline-block; }
    button { padding: 8px 12px; background: green; color: white; border: none; cursor: pointer; }
    .cart-item { margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <h1>My Online Store</h1>
</header>

<div class="container">
  <div class="products">
    <div class="product">
      <h3>Product 1</h3>
      <p>₹500</p>
      <button onclick="addToCart('Product 1', 500)">Add to Cart</button>
    </div>

    <div class="product">
      <h3>Product 2</h3>
      <p>₹800</p>
      <button onclick="addToCart('Product 2', 800)">Add to Cart</button>
    </div>
  </div>

  <div class="cart">
    <h2>Cart</h2>
    <div id="cart-items"></div>
    <h3>Total: ₹<span id="total">0</span></h3>
  </div>
</div>

<script>
  let cart = [];

  function addToCart(name, price) {
    cart.push({ name, price });
    updateCart();
  }

  function updateCart() {
    let cartItems = document.getElementById("cart-items");
    let total = 0;
    cartItems.innerHTML = "";

    cart.forEach((item, index) => {
      total += item.price;
      cartItems.innerHTML += `
        <div class="cart-item">
          ${item.name} - ₹${item.price}
          <button onclick="removeItem(${index})">X</button>
        </div>
      `;
    });

    document.getElementById("total").innerText = total;
  }

  function removeItem(index) {
    cart.splice(index, 1);
    updateCart();
  }
</script>

</body>
</html>
